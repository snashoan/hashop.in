<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Hashop | Shops Near You</title>
  <meta name="description" content="Find nearby shops, see items, and place local orders quickly.">
  <meta name="theme-color" content="#ffffff">
  <meta property="og:site_name" content="Hashop">
  <meta property="og:title" content="Hashop | Shops Near You">
  <meta property="og:description" content="Find nearby shops, see items, and place local orders quickly.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://hashop.in/site/hashop-icon-512.png?v=hashop-home-i123">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:image" content="https://hashop.in/site/hashop-icon-512.png?v=hashop-home-i123">
  <link rel="icon" href="/favicon.ico?v=hashop-home-i123" sizes="any">
  <link rel="icon" type="image/png" sizes="48x48" href="/site/hashop-icon-48.png?v=hashop-home-i123">
  <link rel="icon" type="image/png" sizes="192x192" href="/site/hashop-icon-192.png?v=hashop-home-i123">
  <link rel="icon" type="image/svg+xml" href="/site/hashop-logo.svg?v=hashop-home-i123">
  <link rel="apple-touch-icon" sizes="180x180" href="/site/apple-touch-icon.png?v=hashop-home-i123">
  <link rel="manifest" href="/site/site.webmanifest?v=hashop-home-i123">
  <link rel="mask-icon" href="/site/hashop-logo.svg?v=hashop-home-i123" color="#111111">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/site/styles.css?v=site-20260418a">
  <meta name="hashop-build" content="hashop-home-i123">
  <meta name="hashop-build-label" content="Hashop Home - Iteration 123 - Feed List Action Contrast">
  <link rel="stylesheet" href="/site/home.css?v=hashop-home-i123">
  <link rel="stylesheet" href="/site/home-ui.css?v=hashop-home-i123">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
</head>
<body>
  <div class="shell shell-home">
    <header class="chrome home-chrome">
      <button class="map-locate-button home-locate-button" type="button" id="homeMapLocateAction" aria-label="Locate me" title="Locate me">
        <span class="map-locate-button-icon" aria-hidden="true" data-lucide="locate-fixed"></span>
        <span class="map-locate-button-text">Locate me</span>
      </button>
      <a class="brand" href="/" aria-label="Hashop home">
        <span class="home-hash-logo" aria-hidden="true">#</span>
        <span class="home-brand-copy">
          <span class="brand-name home-brand-name">Hashop</span>
        </span>
      </a>
      <div class="home-live-status" id="homeLiveStatus" role="status" aria-live="polite" hidden>Offline</div>
    </header>

    <main class="home-stage">
      <section class="map-screen" aria-label="Hashop discovery map">
        <div id="discoveryMap" class="discovery-map"></div>
        <button class="map-compass-button" type="button" id="homeMapCompassAction" aria-label="Reset map view" title="Reset map view">
          <span class="map-compass-needle" aria-hidden="true"></span>
          <span class="map-compass-label">N</span>
        </button>
      </section>

      <section class="shop-list-panel is-root-view" aria-label="Shop list">
        <div class="shop-panel-bar">
          <button class="shop-back-action" type="button" id="shopBackAction" aria-label="Open Login">Login</button>
          <button class="shop-pane-toggle" type="button" id="shopPaneToggle" aria-expanded="false" aria-label="Expand shop list">
            <span class="shop-pane-handle" aria-hidden="true"></span>
          </button>
        </div>
        <div class="home-panel-heading" hidden aria-hidden="true"></div>
        <div class="shop-list-head">
          <label class="shop-list-search" aria-label="Search">
            <input class="shop-list-search-input" type="search" id="shopSearchInput" placeholder="Search shops or items" autocomplete="off" spellcheck="false">
          </label>
        </div>
        <div class="shop-list-grid" id="shopList">
          <div class="shop-state-card is-loading" role="status">
            <span class="shop-state-mark" aria-hidden="true"></span>
            <strong>Loading shops</strong>
            <span class="shop-state-skeleton"></span>
          </div>
        </div>
        <nav class="home-bottom-nav" aria-label="Main navigation">
          <button class="home-bottom-link is-active" type="button" data-home-nav="shops">
            <span class="home-bottom-link-icon is-shops" aria-hidden="true"></span>
            <span>Shops</span>
          </button>
          <button class="home-bottom-link" type="button" data-home-nav="items">
            <span class="home-bottom-link-icon is-items" aria-hidden="true"></span>
            <span>Items</span>
          </button>
          <button class="home-bottom-link" type="button" data-home-nav="cart">
            <span class="home-bottom-link-icon is-cart" aria-hidden="true"></span>
            <span>Cart</span>
          </button>
          <button class="home-bottom-link" type="button" data-home-nav="account">
            <span class="home-bottom-link-icon is-account" aria-hidden="true"></span>
            <span>Account</span>
          </button>
        </nav>
      </section>
    </main>
  </div>

  <script id="bootstrapData" type="application/json">__HASHOP_BOOTSTRAP__</script>
  <script>window.__HASHOP_BUILD__ = "hashop-home-i123"; window.__HASHOP_BUILD_LABEL__ = "Hashop Home - Iteration 123 - Feed List Action Contrast";</script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin="" defer></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
  <script src="/site/commerce-core.js?v=hashop-home-i123" defer></script>
  <script src="/site/home.js?v=hashop-home-i123" defer></script>
  <script src="/site/home-polish-core.js?v=hashop-home-i123" defer></script>
  <script src="/site/home-ui.js?v=hashop-home-i123" defer></script>
</body>
</html>
